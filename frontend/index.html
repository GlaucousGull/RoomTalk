<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RoomTalk 聊天室主页</title>
    <style>
        /* 全局布局：左右分栏 + 可拖动 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* 最外层容器：左右布局 */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧：房间列表栏 */
        .left-sidebar {
            width: 320px;
            min-width: 220px;
            max-width: 450px;
            height: 100%;
            background: #fff;
            border-right: 1px solid #eee;
            padding: 15px;
            overflow-y: auto;
        }

        /* 拖动条 */
        .drag-divider {
            width: 6px;
            background: #eaeaea;
            cursor: col-resize;
            height: 100%;
        }
        .drag-divider:hover {
            background: #ccc;
        }

        /* 右侧：聊天区域 */
        .right-chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            height: 100%;
            overflow: hidden;

            /* 初始隐藏聊天区,占据位置即可 */
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        /* 显示聊天区 */
        .right-chat-area.show {
            visibility: visible;
            opacity: 1;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 10px;
        }

        /* 房间标题 */
        .room-title {
            padding: 0 5px;
            font-size: 14px;
            color: #333;
        }

        /* 输入文本框：固定高度 */
        .message-input-bar {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid #eee;
            background: #fff;
            border-radius: 8px;
        }

        /* 基础样式 */
        #createRoomBtn, #refreshBtn {
            padding: 8px 14px;
            font-size: 14px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 6px;
            margin-bottom: 10px;
        }

        /* 输入框 */
        .message-input-bar input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .message-input-bar input:focus {
            border-color: #409eff;
        }

        /* 发送按钮 */
        .message-input-bar button {
            padding: 10px 18px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .message-input-bar button:hover {
            background: #337ecc;
        }

        #createRoomBtn:hover, #refreshBtn:hover {
            background: #337ecc;
        }

        /* 弹窗遮罩层 */
        .modal {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }

        input {
            width: 80%;
            padding: 8px;
            margin: 10px 0;
            font-size: 14px;
        }
        .confirmBtn {
            padding: 8px 20px;
            background: #67c23a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .cancelBtn {
            padding: 8px 20px;
            background: #909399;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
        }

        .user-info-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f0f0;
            padding: 6px 10px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .user-text {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 14px;
            font-weight: bold;
        }

        .user-id {
            font-size: 10px;
            color: #666;
        }

        /* 房间列表 */
        .room_list {
            margin-top: 10px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fafafa;
        }

        .room_list ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .room_list li {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            border-radius: 4px;
        }

        .room_list li:hover {
            background: #f0f7ff;
        }

        /* 聊天消息容器 */
        .chat-history {
            flex: 1;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fff;
            overflow-y: auto;
            position: relative;
            padding: 10px;
        }

        /* 单条消息容器 */
        .msg-item {
            display: flex;
            margin: 10px 0;
            align-items: flex-start;
        }

        .self-msg {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #409eff;
            color: #fff;
            text-align: center;
            line-height: 40px;
            font-size: 16px;
            margin: 0 10px;
            flex-shrink: 0;
        }

        .msg-content {
            max-width: 65%;
        }

        .msg-name {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .msg-bubble {
            padding: 8px 12px;
            border-radius: 8px;
            background: #f4f4f4;
            word-wrap: break-word;
        }

        .self-msg .msg-bubble {
            background: #409eff;
            color: #fff;
        }

        /* 密码弹窗 */
        .room-pwd-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .pwd-box {
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
        }

        #roomPasswordInputWrap {
            display: none;
            margin: 15px 0;
        }        
    </style>
</head>
<body>

<!-- 最外层布局容器 -->
<div class="app-container">

    <!-- 左侧：房间列表 -->
    <div class="left-sidebar" id="leftSidebar">
        <div id="userInfoTag" class="user-info-tag">
            <div id="userAvater" class="avatar">
                <span id="defaultAvatarIcon">👤</span>
            </div>
            <div class="user-text">
                <div id="displayUserName" class="user-name">加载中...</div>
                <div id="displayUserId" class="user-id"></div>
            </div>
        </div>

        <button id="createRoomBtn">创建房间</button>
        <button id="refreshBtn">刷新房间</button>

        <div class="room_list">
            <h3>房间列表</h3>
            <ul id="room_list"></ul>
        </div>
    </div>

    <!-- 可拖动分割线 -->
    <div class="drag-divider" id="dragDivider"></div>

    <!-- 右侧：聊天区域 -->
    <div id="rightChatArea" class="right-chat-area">
        <div id="chatContainer" class="chat-container">
            <div class="room-title">
                <h3>房间名: 测试房间</h3>
            </div>
            <div id="chatHistory" class="chat-history"></div>
            <div class="message-input-bar">
                <input type="text" id="msgInput" placeholder="输入消息...">
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </div>
</div>

<!-- 私域房间密码弹窗 -->
<div id="pwdModal" class="room-pwd-modal">
    <div class="pwd-box">
        <h4>私域房间，请输入密码</h4>
        <input type="password" placeholder="输入密码" id="roomPwdInput">
        <button id="confirmPwdBtn">确认加入</button>
        <button id="cancelPwdBtn">取消</button>
    </div>
</div>

<!-- 创建房间弹窗 -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <p>创建新房间</p>
        <input type="text" id="roomName" placeholder="房间名称（可选）">
        <label>房间类型选择：</label>
        <select id="roomTypeSelBtn">
            <option value="0" selected>公域</option>
            <option value="1">私域</option>
        </select>

        <div id="roomPasswordInputWrap">
            <label>房间密码</label>
            <input type="password" id="roomPasswordInput" placeholder="请输入私域房间密码">
        </div>
        <button class="confirmBtn" onclick="createRoom()">确认创建</button>
        <button class="cancelBtn" onclick="closeModal()">取消</button>
    </div>
</div>

<script>
    let user_data = null;
    let current_joining_room = null;
    let room_list = [];
    let waitAckMap = {} //消息等待确认池

    let lastServerResponseTime = Date.now();
    let heartbeatTimer = null;      // 心跳定时器
    let reconnectTimeOut = null;    // 重连定时器
    const HEARTBEAT_INTERVAL = 30000;  // 30秒心跳

    // 连接函数
    function connectWebSocket() {
        const wsUrl = "ws://" + window.location.hostname + ":10000";
        ws = new WebSocket(wsUrl);

        // 连接建立
        ws.onopen = function() {
            console.log("WebSocket 连接成功");

            // 清空重连定时器
            if (reconnectTimeOut) clearTimeout(reconnectTimeOut);

            // 发送房间同步指令
            ws.send(JSON.stringify({ type: "synchro_room_list" }));

            stopHeartbeat();

            //  启动心跳定时器
            startHeartbeat();
        };

        // 监听后端发来的消息
        ws.onmessage = function(evt) {
            const data = JSON.parse(evt.data);
            console.log("后端返回：", data);
            lastServerResponseTime = Date.now();    // 刷新服务最后一次发送时间


            // 处理后端返回的消息
            switch(data.type) {
                case "init_user":
                    user_data = {
                        user_id: data.data.user_id,
                        user_name: data.data.user_name
                    };
                    // 更新用户信息
                    document.getElementById("displayUserName").innerText = user_data.user_name;
                    document.getElementById("displayUserId").innerText = `UID: ${user_data.user_id.slice(-6)}`;
                    break;

                case "create_room_success":
                    room_list.push({
                        room_id: data.data.room_id,
                        room_type: data.data.room_type,
                        room_name: data.data.room_name,
                    });
                    renderRoomList();
                    alert("创建房间成功！");
                    break;

                case "create_room_fail":
                    alert("创建房间失败");
                    break;

                case "room_list":
                    room_list = data.data.rooms;
                    renderRoomList();
                    break;

                case "join_room_success":
                    document.querySelector(".right-chat-area").classList.add("show")
                    // 加载历史消息
                    load_history_messages(data.data.his_msg);
                    break;

                case "join_room_fail":
                    alert(`加入失败：${data.data.msg || "未知错误"}`);
                    break;

                case "new_message":
                    new_message_processing(data.data);
                    break;

                case "heartbeat_ack":
                    // 清除定时器的任务
                    break;
            }
        };


        // 连接关闭 -> 自动重连
        ws.onclose = function () {
            console.log("连接断开，尝试重连中");
            stopHeartbeat();    //
            scheduleReconnect(); // 自动重连
        }

        // 连接错误
        ws.onerror = function (err) {
            console.log("webSocket错误", err);
        }
    }

    // 心跳发送
    function startHeartbeat() {
        heartbeatTimer = setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) {
                // 发送心跳包
                ws.send(JSON.stringify({
                    type: "heartbeat"
                }));
                console.log("心跳发送")
            }
        }, HEARTBEAT_INTERVAL);
    }

    // 超时检测
    function startTimeoutCheck() {
        timeoutTimer = setTimeout(() => {
            // 获取当前时间戳
            const now = Date.now();
            // 计算超时
            if (now - lastServerResponseTime > HEARTBEAT_INTERVAL) {
                console.log("服务器超时无响应，重连中...")
                // 启动重连定时器
                scheduleReconnect();
            }
        })
    }

    // 停止心跳
    function stopHeartbeat() {
        if (heartbeatTimer) {
            clearInterval(heartbeatTimer);
            heartbeatTimer = null;  // 清空变量，防止旧引用
        }
    }

    // 自动重连
    function scheduleReconnect() {
        if (reconnectTimeOut) clearTimeout(reconnectTimeOut);   //防止重连叠加
        ws.close();
        reconnectTimeOut = setTimeout(() => {
            connectWebSocket();
        }, 3000);
    }

    // 新消息广播处理
    function new_message_processing(data) {
        msg_id = data.msg_id;

        if (user_data.user_id == data.user_id) {
            // 自己发送的消息，不渲染，并清除消息超时任务
            if (waitAckMap[msg_id]) {
                clearTimeout(msg_id);
                delete waitAckMap[msg_id];
            }
            return;
        }

        // 追加消息
        append_single_message(data);
    }

    // 启动
    connectWebSocket();

    // 房间点击绑定以及渲染列表
    function renderRoomList() {
        const ul = document.getElementById("room_list");
        ul.innerHTML = "";
        room_list.forEach(room => {
            const li = document.createElement("li");
            const icon = room.room_type == 1 ? "🔒" : "💬";
            li.innerText = `${icon} 房间号：${room.room_id} | ${room.room_name}`;
            li.onclick = () => handleRoomClick(room);
            ul.appendChild(li);
        });
    }

    // 处理房间点击事件
    function handleRoomClick(room) {
        if (!user_data) { alert("用户信息未加载"); return; }
        current_joining_room = room;

        if (room.room_type == 1) {
            document.getElementById("pwdModal").style.display = "flex";
            // 获取用户输出的密码
        } else {
            ws.send(JSON.stringify({
                type: "join_room",
                data: {
                    room_id: room.room_id,
                    user_id: user_data.user_id
                }
            }));
        }
    }

    // 关闭密码弹窗
    function closePwdModal() {
        document.getElementById("pwdModal").style.display = "none";
        document.getElementById("roomPwdInput").value = "";
        current_joining_room = null;
    }

    // 私域房间确认密码
    document.getElementById("confirmPwdBtn").onclick = function() {
        const pwd = document.getElementById("roomPwdInput").value.trim();
        if (!pwd) return alert("请输入密码");

        ws.send(JSON.stringify({
            type: "join_room",
            data: {
                room_id: current_joining_room.room_id,
                password: pwd,
                user_id: user_data.user_id
            }
        }));
        closePwdModal();
    };

    // 取消
    document.getElementById("cancelPwdBtn").onclick = closePwdModal;

    // 创建房间
    const modal = document.getElementById("createModal");
    document.getElementById("createRoomBtn").onclick = () => modal.style.display = "flex";
    function closeModal() { modal.style.display = "none"; }

    // 监听选择房间的类型
    document.getElementById("roomTypeSelBtn").addEventListener("change", function() {
        const roomType = this.value;
        document.getElementById("roomPasswordInputWrap").style.display = roomType == "1" ? "block" : "none";
    })

    // 创建房间
    function createRoom() {
        if (!user_data) return alert("请等待用户初始化");
        // 区分用户创建的房间类型
        room_name_value = document.getElementById("roomName").value.trim(),
        room_type_value = document.getElementById("roomTypeSelBtn").value
        switch(room_type_value) {
            case "0": 
                ws.send(JSON.stringify({
                    type: "create_room",
                    data: {
                        user_id: user_data.user_id,
                        room_name: room_name_value,
                        room_type: room_type_value
                    }}));
                    break;
            case "1":
                // 获取私域房间的密码
                password = document.getElementById("roomPasswordInput").value.trim();
                if(!password) {
                    alert("私域房间必须设置密码");
                    return;
                }
                ws.send(JSON.stringify({
                    type: "create_room",
                    data: {
                        user_id: user_data.user_id,
                        room_name: room_name_value,
                        room_type: room_type_value,
                        password: password
                    }}));
                    break;
        }

        closeModal();
        document.getElementById("roomName").value = "";
        document.getElementById("roomPasswordInput").value = "";
        document.getElementById("roomTypeSelBtn").value = "0";
    }

    // 刷新
    document.getElementById("refreshBtn").onclick = () => {
        ws.send(JSON.stringify({ type: "synchro_room_list" }));
    };

    // 加载房间历史消息
    function load_history_messages(msgList) {
        const chatHistory = document.getElementById("chatHistory");
        // 进来先清空原有消息
        chatHistory.innerHTML = "";
        if (!Array.isArray(msgList)) { console.warn("不是数组"); return; }
        msgList.forEach(item => append_single_message(item));
    }

    // 渲染单条消息
    function append_single_message(msg) {
        // 信息是是个三元组 {用户id， 用户名，消息}
        isSelf = (msg.user_id == user_data.user_id);

        // 取用户名最后字符当成用户的头像
        const avatarText = msg.user_name.charAt(0);

        // 获取消息区盒子
        const charHigstory = document.getElementById("charHigstory");

        // 拼接消息
        const msgHtml = `
            <div class="msg-item ${isSelf ? 'self-msg' : 'other-msg'}" data-msg-id="${msg.msg_id}">
                <div class="msg-avatar">${avatarText}</div>
                <div class="msg-content">
                    <div class="msg-name">${msg.user_name}</div>
                    <div class="msg-bubble">${msg.body}</div>
                </div>
            </div>
        `;
        //  追加到消息区
        chatHistory.innerHTML += msgHtml;
        // 滚动到底部
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    // 可拖动逻辑（LeetCode效果）
    const leftSidebar = document.getElementById('leftSidebar');
    const dragDivider = document.getElementById('dragDivider');
    let isDragging = false;

    dragDivider.addEventListener('mousedown', (e) => {
        isDragging = true;
        document.body.style.cursor = 'col-resize';
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let w = e.clientX;
        if (w < 220) w = 220;
        if (w > 450) w = 450;
        leftSidebar.style.width = w + 'px';
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
        document.body.style.cursor = 'default';
    });

    // 消息发送
    function sendMessage() {
        // 获取消息文本框数据
        const input = document.getElementById("msgInput");
        const content = input.value;

        // 消息判断
        if (!content.trim()){
            // 空白内容，直接不处理
            return;
        }

        // 生成消息id
        msg_id = "msg_" + Date.now() + Math.random();

        append_single_message({
            user_id: user_data.user_id,
            user_name: user_data.user_name,
            body: content,
            msg_id: msg_id
        })

        // 发送原始内容
        ws.send(JSON.stringify({
            type: "send_message",
            data: {
                user_id: user_data.user_id,
                room_id: current_joining_room.room_id,
                msg: content,
                msg_id: msg_id
            }
        }));

        if (!waitAckMap) {
            waitAckMap = {};
        }

        // 消息确认池添加消息超时检测方法
        const timer = setTimeout(() => {
            if (typeof markMessageFailed == "function") {
                markMessageFailed(msg_id);
            }
            delete waitAckMap[msg_id];
        }, 5000);

        // 添加超时处理任务
        waitAckMap[msg_id] = timer;

        // 发送后清空输入文本框
        input.value = "";
    }

    // 消息发送失败
    function markMessageFailed(msg_id) {
        // 找到对应消息元素，添加失败样式
        const msgItem = document.querySelector(`.msg-item[data-msg-id="${msg_id}"]`);
        if (msgItem) return;
        if (!msgItem) {
            console.log("没有找到消息，可能已被删除");
            return;
        }
        // 找到气泡
        const buttle = msgItem.querySelector(".msg-buttle");
        if (!buttle) {
            console.log("没有找到消息，可能已被删除");
            return;
        }
        // 标红样式
        msgItem.style.opacity = "0.8";
        bubble.style.background = "#ff4444";
        bubble.style.color = "#fff";

        // 前面加感叹号 ❗
        bubble.innerText = "❗" + bubble.innerText;
    }

    //等待页面加载完成，再绑定事件
    window.onload = function() {
        document.getElementById("sendBtn").onclick = sendMessage;
    
        document.getElementById("msgInput").onkeydown = (e) => {
            if (e.key == "Enter") {
                e.preventDefault(); // 防止输入框换行
                sendMessage();
            }
        }
    }

</script>

</body>
</html>
